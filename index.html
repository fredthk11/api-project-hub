<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Room | My Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <!-- Hero Section -->
    <header class="py-20 bg-gradient-to-b from-slate-900 to-slate-950 border-b border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-6xl font-black mb-6 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 bg-clip-text text-transparent">
                WEB ROOM
            </h1>
            <p class="text-xl text-slate-400 max-w-2xl mx-auto">
                Welcome to my digital workspace. Explore my experiments, projects, and prototypes organized by category.
            </p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
            
            <!-- Category Card: API Projects -->
            <a href="./api/index.html" class="group block p-8 bg-slate-900 rounded-3xl border border-slate-800 transition-all hover:border-indigo-500/50 hover:shadow-2xl hover:shadow-indigo-500/10">
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 bg-indigo-900/20 rounded-2xl flex items-center justify-center text-indigo-500 text-3xl group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold mb-2 group-hover:text-indigo-400 transition-colors">API Projects</h2>
                        <p class="text-slate-400">Web applications powered by various public APIs.</p>
                    </div>
                </div>
            </a>
            
            <!-- Placeholder for future category -->
            <div class="group block p-8 bg-slate-900/50 rounded-3xl border border-dashed border-slate-800 opacity-50">
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-600 text-3xl">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold mb-2">New Category</h2>
                        <p class="text-slate-500">Coming soon...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-20 border-t border-slate-900 text-center">
        <p class="text-slate-600">&copy; 2026 Web Room. Hosted on GitHub Pages.</p>
    </footer>

</body>
</html>
