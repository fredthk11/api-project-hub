<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waktu Solat - Kalendar Bulanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .today-row { background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-[#011612] text-slate-100 min-h-screen">

    <!-- Navigation -->
    <header class="bg-[#022c22]/80 backdrop-blur-md sticky top-0 z-50 border-b border-emerald-900/50">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-emerald-500 hover:text-emerald-400 transition-colors" title="Back to Hub">
                    <i class="fa-solid fa-grip-vertical text-2xl"></i>
                </a>
                <h1 class="text-xl font-extrabold tracking-tight text-emerald-500">SOLATHUB</h1>
            </div>
            <nav class="flex items-center gap-6 text-sm font-semibold">
                <a href="index.html" class="text-slate-400 hover:text-emerald-400 transition-colors">Utama</a>
                <a href="calendar.html" class="text-emerald-400 border-b-2 border-emerald-400 pb-1">Kalendar</a>
                <a href="zones.html" class="text-slate-400 hover:text-emerald-400 transition-colors">Zon</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h2 class="text-4xl font-black mb-2 flex items-center gap-4">
                    <i class="fa-solid fa-calendar-days text-emerald-500"></i>
                    Jadual Bulanan
                </h2>
                <p class="text-slate-500">Zon Semasa: <span id="zoneNameDisplay" class="text-emerald-400 font-bold">---</span></p>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="monthSelect" onchange="fetchMonthly()" class="bg-slate-900 border border-slate-800 text-white rounded-xl px-4 py-2 focus:ring-2 focus:ring-emerald-500 outline-none">
                    <option value="1">Januari</option>
                    <option value="2">Februari</option>
                    <option value="3">Mac</option>
                    <option value="4">April</option>
                    <option value="5">Mei</option>
                    <option value="6">Jun</option>
                    <option value="7">Julai</option>
                    <option value="8">Ogos</option>
                    <option value="9">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Disember</option>
                </select>
            </div>
        </div>

        <!-- Desktop Table -->
        <div class="hidden md:block overflow-x-auto glass rounded-[2.5rem] shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-emerald-950/40 text-emerald-500 uppercase text-xs font-black tracking-widest">
                        <th class="p-6 border-b border-emerald-900/30">Tarikh</th>
                        <th class="p-6 border-b border-emerald-900/30">Imsak</th>
                        <th class="p-6 border-b border-emerald-900/30">Subuh</th>
                        <th class="p-6 border-b border-emerald-900/30">Syuruk</th>
                        <th class="p-6 border-b border-emerald-900/30">Zohor</th>
                        <th class="p-6 border-b border-emerald-900/30">Asar</th>
                        <th class="p-6 border-b border-emerald-900/30">Maghrib</th>
                        <th class="p-6 border-b border-emerald-900/30">Isyak</th>
                    </tr>
                </thead>
                <tbody id="calendarBody" class="text-sm font-medium">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>

        <!-- Mobile List -->
        <div id="mobileList" class="md:hidden space-y-4">
            <!-- Mobile items injected here -->
        </div>

    </main>

    <script>
        const API_BASE = 'https://api.waktusolat.app/v2/solat';
        
        document.addEventListener('DOMContentLoaded', () => {
            const currentMonth = new Date().getMonth() + 1;
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('zoneNameDisplay').innerText = localStorage.getItem('currentZoneName') || 'Pilih Zon';
            fetchMonthly();
        });

        async function fetchMonthly() {
            const zone = localStorage.getItem('selectedZone');
            if (!zone) return;

            try {
                const res = await fetch(`${API_BASE}/${zone}`);
                const data = await res.json();
                renderTable(data.prayers);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTable(prayers) {
            const body = document.getElementById('calendarBody');
            const mobileList = document.getElementById('mobileList');
            body.innerHTML = '';
            mobileList.innerHTML = '';

            const today = new Date().getDate();
            const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
            const currentMonthName = monthNames[new Date().getMonth()];

            prayers.forEach(p => {
                const isToday = p.day === today;
                const rowClass = isToday ? 'today-row' : '';
                
                const tr = document.createElement('tr');
                tr.className = `border-b border-emerald-900/20 hover:bg-emerald-900/10 transition-colors ${rowClass}`;
                
                const dateStr = `${p.day} ${currentMonthName}`;
                const times = [p.fajr, p.syuruk, p.dhuhr, p.asr, p.maghrib, p.isha];

                tr.innerHTML = `
                    <td class="p-6 font-bold text-slate-300">${dateStr}</td>
                    ${times.map(t => {
                        return `<td class="p-6">${new Date(t * 1000).toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' })}</td>`;
                    }).join('')}
                `;
                body.appendChild(tr);

                // Mobile Card
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-3xl ${rowClass}`;
                card.innerHTML = `
                    <p class="font-bold text-emerald-500 mb-4">${dateStr}</p>
                    <div class="grid grid-cols-2 gap-4 text-xs">
                        ${['Subuh', 'Syuruk', 'Zohor', 'Asar', 'Maghrib', 'Isyak'].map((name, i) => `
                            <div class="flex justify-between border-b border-emerald-900/20 pb-1">
                                <span class="text-slate-500">${name}</span>
                                <span class="font-bold">${new Date(times[i] * 1000).toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
                mobileList.appendChild(card);
            });
        }
    </script>
</body>
</html>
