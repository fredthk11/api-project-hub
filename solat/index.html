<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waktu Solat Malaysia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .emerald-gradient { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-prayer { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="bg-[#011612] text-slate-100 min-h-screen">

    <!-- Navigation -->
    <header class="bg-[#022c22]/80 backdrop-blur-md sticky top-0 z-50 border-b border-emerald-900/50">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-emerald-500 hover:text-emerald-400 transition-colors" title="Back to Hub">
                    <i class="fa-solid fa-grip-vertical text-2xl"></i>
                </a>
                <h1 class="text-xl font-extrabold tracking-tight text-emerald-500">SOLATHUB</h1>
            </div>
            <nav class="flex items-center gap-6 text-sm font-semibold">
                <a href="index.html" class="text-emerald-400 border-b-2 border-emerald-400 pb-1">Utama</a>
                <a href="calendar.html" class="text-slate-400 hover:text-emerald-400 transition-colors">Kalendar</a>
                <a href="zones.html" class="text-slate-400 hover:text-emerald-400 transition-colors">Zon</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <!-- Location Picker -->
        <section class="mb-8 flex flex-col md:flex-row items-end gap-4">
            <div class="relative flex-grow w-full">
                <label class="block text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 ml-1">Pilih Negeri</label>
                <select id="stateSelect" onchange="handleStateChange()" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm appearance-none">
                    <option value="">-- Pilih Negeri --</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-[2.4rem] text-slate-600 pointer-events-none"></i>
            </div>
            <div class="relative flex-grow w-full">
                <label class="block text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 ml-1">Pilih Daerah / Zon</label>
                <select id="zoneSelect" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm appearance-none" disabled>
                    <option value="">-- Pilih Daerah --</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-[2.4rem] text-slate-600 pointer-events-none"></i>
            </div>
            <button onclick="handleSaveLocation()" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-2xl transition-all shadow-lg shadow-emerald-950/20 whitespace-nowrap">
                <i class="fa-solid fa-check-to-slot mr-2"></i>
                Set Tempat
            </button>
        </section>

        <!-- Hero: Countdown -->
        <section class="emerald-gradient rounded-[2.5rem] p-8 md:p-16 mb-12 shadow-2xl shadow-emerald-950/50 relative overflow-hidden text-center">
            <div class="relative z-10">
                <div id="currentZoneDisplay" class="inline-flex items-center gap-2 bg-black/20 px-4 py-2 rounded-full text-xs font-bold text-emerald-400 mb-6 tracking-widest uppercase">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Sila Pilih Lokasi</span>
                </div>
                
                <h2 class="text-slate-400 text-lg md:text-xl font-medium mb-2">Seterusnya: <span id="nextPrayerName" class="text-white font-bold">---</span></h2>
                <div id="countdown" class="text-6xl md:text-8xl font-black tracking-tighter mb-6">00:00:00</div>
                
                <p id="currentDate" class="text-emerald-500/80 font-medium"></p>
            </div>
            
            <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"></div>
        </section>

        <!-- Today's Times Grid -->
        <section>
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fa-solid fa-clock text-emerald-500"></i>
                    Waktu Solat Hari Ini
                </h3>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-slate-900 px-3 py-1 rounded-lg border border-slate-800">Rasmi JAKIM</span>
            </div>

            <div id="prayerGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                <p class="col-span-full text-center py-10 text-slate-600 italic">Sila pilih lokasi anda di atas untuk memulakan.</p>
            </div>
        </section>

    </main>

    <footer class="mt-20 py-10 border-t border-emerald-900/30 text-center text-slate-500 text-sm">
        <p>Data dikuasakan oleh WaktuSolat.app & JAKIM</p>
        <p class="mt-2">&copy; 2026 SolatHub Portfolio. For study purposes.</p>
    </footer>

    <script>
        const API_BASE = 'https://mpt.i906.my/api/prayer';
        let prayerData = null;
        let timerInterval = null;

        const zoneData = [
            { state: "Johor", zones: [ { code: "JHR01", location: "Pulau Aur dan Pulau Pemanggil" }, { code: "JHR02", location: "Johor Bahru, Kota Tinggi, Mersing" }, { code: "JHR03", location: "Kluang, Pontian" }, { code: "JHR04", location: "Batu Pahat, Muar, Segamat, Ledang" } ] },
            { state: "Kedah", zones: [ { code: "KDH01", location: "Kota Setar, Kubang Pasu, Pokok Sena" }, { code: "KDH02", location: "Kuala Muda, Yan, Pendang" }, { code: "KDH03", location: "Padang Terap, Sik" }, { code: "KDH04", location: "Baling" }, { code: "KDH05", location: "Bandar Baharu, Kulim" }, { code: "KDH06", location: "Langkawi" }, { code: "KDH07", location: "Puncak Gunung Jerai" } ] },
            { state: "Kelantan", zones: [ { code: "KTN01", location: "Kota Bharu, Pasir Mas, Tumpat, Kuala Krai etc." }, { code: "KTN03", location: "Gua Musang, Jeli" } ] },
            { state: "Melaka", zones: [ { code: "MLK01", location: "Seluruh Negeri Melaka" } ] },
            { state: "Negeri Sembilan", zones: [ { code: "NGS01", location: "Tampin, Jempol" }, { code: "NGS02", location: "Seremban, Port Dickson, etc." } ] },
            { state: "Pahang", zones: [ { code: "PHG01", location: "Pulau Tioman" }, { code: "PHG02", location: "Kuantan, Pekan, Rompin" }, { code: "PHG03", location: "Jerantut, Temerloh, Maran" }, { code: "PHG04", location: "Bentong, Lipis, Raub" }, { code: "PHG05", location: "Genting Sempah, Janda Baik" }, { code: "PHG06", location: "Cameron Highlands, Genting Highlands" } ] },
            { state: "Perlis", zones: [ { code: "PLS01", location: "Seluruh Negeri Perlis" } ] },
            { state: "Pulau Pinang", zones: [ { code: "PNG01", location: "Seluruh Negeri Pulau Pinang" } ] },
            { state: "Perak", zones: [ { code: "PRK01", location: "Tapah, Slim River, Tanjung Malim" }, { code: "PRK02", location: "Ipoh, Batu Gajah, Kampar" }, { code: "PRK03", location: "Lenggong, Pengkalan Hulu, Grik" }, { code: "PRK04", location: "Temengor, Belum" }, { code: "PRK05", location: "Teluk Intan, Lumut, Sitiawan" }, { code: "PRK06", location: "Taiping, Parit Buntar" }, { code: "PRK07", location: "Bukit Larut" } ] },
            { state: "Selangor", zones: [ { code: "SGR01", location: "Gombak, Petaling, Sepang, S.Alam" }, { code: "SGR02", location: "Kuala Selangor, Sabak Bernam" }, { code: "SGR03", location: "Klang, Kuala Langat" } ] },
            { state: "Terengganu", zones: [ { code: "TRG01", location: "Kuala Terengganu, Marang" }, { code: "TRG02", location: "Besut, Setiu" }, { code: "TRG03", location: "Hulu Terengganu" }, { code: "TRG04", location: "Dungun, Kemaman" } ] },
            { state: "W. Persekutuan", zones: [ { code: "WLY01", location: "Kuala Lumpur, Putrajaya" }, { code: "WLY02", location: "Labuan" } ] },
            { state: "Sarawak", zones: [ { code: "SWK01", location: "Limbang, Lawas" }, { code: "SWK02", location: "Miri, Marudi" }, { code: "SWK03", location: "Bintulu, Belaga" }, { code: "SWK04", location: "Sibu, Mukah, Kapit" }, { code: "SWK08", location: "Kuching, Bau, Lundu" } ] },
            { state: "Sabah", zones: [ { code: "SBH01", location: "Sandakan, Kinabatangan" }, { code: "SBH04", location: "Tawau, Semporna" }, { code: "SBH07", location: "Kota Kinabalu, Penampang, Papar" }, { code: "SBH09", location: "Beaufort, Sipitang" } ] }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            populateStates();
            initApp();
            updateDate();
        });

        function populateStates() {
            const stateSelect = document.getElementById('stateSelect');
            zoneData.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.state;
                opt.innerText = item.state;
                stateSelect.appendChild(opt);
            });
        }

        function handleStateChange() {
            const stateName = document.getElementById('stateSelect').value;
            const zoneSelect = document.getElementById('zoneSelect');
            zoneSelect.innerHTML = '<option value="">-- Pilih Daerah --</option>';
            
            if (!stateName) {
                zoneSelect.disabled = true;
                return;
            }

            const stateObj = zoneData.find(s => s.state === stateName);
            stateObj.zones.forEach(z => {
                const opt = document.createElement('option');
                opt.value = z.code;
                opt.innerText = z.location;
                zoneSelect.appendChild(opt);
            });
            zoneSelect.disabled = false;
        }

        function handleSaveLocation() {
            const stateName = document.getElementById('stateSelect').value;
            const zoneCode = document.getElementById('zoneSelect').value;
            const zoneName = document.getElementById('zoneSelect').options[document.getElementById('zoneSelect').selectedIndex].text;

            if (!stateName || !zoneCode) {
                alert('Sila pilih Negeri dan Daerah terlebih dahulu.');
                return;
            }

            localStorage.setItem('selectedZone', zoneCode);
            localStorage.setItem('currentZoneName', zoneName);
            localStorage.setItem('selectedState', stateName);
            
            fetchPrayerTimes(zoneCode);
        }

        async function initApp() {
            const savedZone = localStorage.getItem('selectedZone');
            const savedState = localStorage.getItem('selectedState');

            if (savedZone && savedState) {
                document.getElementById('stateSelect').value = savedState;
                handleStateChange();
                document.getElementById('zoneSelect').value = savedZone;
                fetchPrayerTimes(savedZone);
            }
        }

        async function fetchPrayerTimes(zone) {
            try {
                const res = await fetch(`${API_BASE}/${zone}`);
                const data = await res.json();
                prayerData = data.data;
                
                document.getElementById('currentZoneDisplay').querySelector('span').innerText = data.data.place;
                renderPrayerTimes(data.data.times);
                startCountdown(data.data.times);
            } catch (err) {
                console.error("Fetch error", err);
            }
        }

        function renderPrayerTimes(times) {
            const grid = document.getElementById('prayerGrid');
            const prayerNames = ['Imsak', 'Subuh', 'Syuruk', 'Zohor', 'Asar', 'Maghrib', 'Isyak'];
            grid.innerHTML = '';

            times.forEach((time, index) => {
                const prayerTime = new Date(time * 1000);
                const timeStr = prayerTime.toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit', hour12: true });
                
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-[2rem] text-center border border-emerald-900/20 transition-all hover:scale-105`;
                card.id = `prayer-${index}`;
                
                card.innerHTML = `
                    <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2">${prayerNames[index]}</p>
                    <p class="text-2xl font-black">${timeStr}</p>
                `;
                grid.appendChild(card);
            });
        }

        function startCountdown(times) {
            clearInterval(timerInterval);
            const prayerNames = ['Imsak', 'Subuh', 'Syuruk', 'Zohor', 'Asar', 'Maghrib', 'Isyak'];

            timerInterval = setInterval(() => {
                const now = Math.floor(Date.now() / 1000);
                let nextIndex = -1;

                for (let i = 0; i < times.length; i++) {
                    if (times[i] > now) {
                        nextIndex = i;
                        break;
                    }
                }

                if (nextIndex === -1) {
                    document.getElementById('nextPrayerName').innerText = 'Imsak (Besok)';
                    document.getElementById('countdown').innerText = '--:--:--';
                    return;
                }

                document.getElementById('nextPrayerName').innerText = prayerNames[nextIndex];
                
                document.querySelectorAll('.glass').forEach(el => el.classList.remove('active-prayer'));
                const activeCard = document.getElementById(`prayer-${nextIndex}`);
                if (activeCard) activeCard.classList.add('active-prayer');

                const diff = times[nextIndex] - now;
                const hours = Math.floor(diff / 3600);
                const mins = Math.floor((diff % 3600) / 60);
                const secs = diff % 60;

                document.getElementById('countdown').innerText = 
                    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ms-MY', options);
        }
    </script>
</body>
</html>
