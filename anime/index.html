<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeHub - Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .anime-card:hover .overlay { opacity: 1; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <!-- Navigation / Hero -->
    <header class="bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-slate-500 hover:text-indigo-400 transition-colors" title="Back to Hub">
                    <i class="fa-solid fa-grip-vertical text-2xl"></i>
                </a>
                <h1 class="text-3xl font-black bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent cursor-pointer" onclick="window.location.href='index.html'">
                    ANIMEHUB
                </h1>
            </div>
            
            <div class="flex w-full md:w-auto gap-2 items-center">
                <a href="watchlist.html" class="text-slate-400 hover:text-pink-500 transition-colors mr-4 flex items-center gap-2">
                    <i class="fa-solid fa-heart"></i>
                    <span class="hidden sm:inline">Watchlist</span>
                </a>
                <div class="relative flex-grow md:w-80">
                    <input type="text" id="searchInput" placeholder="Search anime..." 
                        class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 px-5 pl-12 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-slate-500"></i>
                </div>
                <button onclick="getRandomAnime()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-full transition-colors flex items-center gap-2 whitespace-nowrap">
                    <i class="fa-solid fa-shuffle"></i>
                    <span class="hidden sm:inline text-sm">Surprise Me</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <!-- Genre Filters -->
        <section class="mb-10 overflow-x-auto pb-2 flex gap-3 scrollbar-hide">
            <button onclick="fetchTrending()" class="genre-btn bg-indigo-600 text-white px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Trending</button>
            <button onclick="fetchByGenre(1)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Action</button>
            <button onclick="fetchByGenre(2)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Adventure</button>
            <button onclick="fetchByGenre(4)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Comedy</button>
            <button onclick="fetchByGenre(8)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Drama</button>
            <button onclick="fetchByGenre(10)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Fantasy</button>
            <button onclick="fetchByGenre(22)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Romance</button>
            <button onclick="fetchByGenre(24)" class="genre-btn bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all">Sci-Fi</button>
        </section>

        <!-- Content Area -->
        <section>
            <h2 id="sectionTitle" class="text-2xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-fire text-orange-500"></i>
                Trending Now
            </h2>
            
            <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                <!-- Anime cards injected here -->
            </div>

            <!-- Loader -->
            <div id="loader" class="flex justify-center py-20 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
            </div>
        </section>
    </main>

    <footer class="border-t border-slate-800 mt-20 py-10 text-center text-slate-500 text-sm">
        <p>Data provided by Jikan API (MyAnimeList)</p>
        <p class="mt-2">&copy; 2026 AnimeHub. For study purposes.</p>
    </footer>

    <script>
        const API_BASE = 'https://api.jikan.moe/v4';
        const animeGrid = document.getElementById('animeGrid');
        const loader = document.getElementById('loader');
        const sectionTitle = document.getElementById('sectionTitle');
        const searchInput = document.getElementById('searchInput');

        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            fetchTrending();
        });

        // Search logic with debouncing
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length > 2) {
                searchTimeout = setTimeout(() => searchAnime(query), 500);
            } else if (query.length === 0) {
                fetchTrending();
            }
        });

        async function fetchTrending() {
            showLoader(true);
            sectionTitle.innerHTML = `<i class="fa-solid fa-fire text-orange-500"></i> Trending Now`;
            updateActiveBtn('Trending');
            try {
                const res = await fetch(`${API_BASE}/top/anime`);
                const data = await res.json();
                renderCards(data.data, animeGrid);
            } catch (err) {
                console.error(err);
                animeGrid.innerHTML = '<p class="text-red-400">Failed to load trending anime.</p>';
            } finally {
                showLoader(false);
            }
        }

        async function searchAnime(query) {
            showLoader(true);
            sectionTitle.innerHTML = `<i class="fa-solid fa-magnifying-glass text-indigo-500"></i> Search Results for "${query}"`;
            try {
                const res = await fetch(`${API_BASE}/anime?q=${query}`);
                const data = await res.json();
                renderCards(data.data, animeGrid);
            } catch (err) {
                console.error(err);
            } finally {
                showLoader(false);
            }
        }

        async function fetchByGenre(id) {
            showLoader(true);
            const genreNames = {1:'Action', 2:'Adventure', 4:'Comedy', 8:'Drama', 10:'Fantasy', 22:'Romance', 24:'Sci-Fi'};
            sectionTitle.innerHTML = `<i class="fa-solid fa-tag text-indigo-500"></i> ${genreNames[id]} Anime`;
            updateActiveBtn(genreNames[id]);
            try {
                const res = await fetch(`${API_BASE}/anime?genres=${id}&order_by=score&sort=desc`);
                const data = await res.json();
                renderCards(data.data, animeGrid);
            } catch (err) {
                console.error(err);
            } finally {
                showLoader(false);
            }
        }

        async function getRandomAnime() {
            try {
                const res = await fetch(`${API_BASE}/random/anime`);
                const data = await res.json();
                window.location.href = `details.html?id=${data.data.mal_id}`;
            } catch (err) {
                console.error(err);
            }
        }

        function renderCards(animes, container) {
            container.innerHTML = '';
            if (!animes || animes.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center py-10 text-slate-500">No results found.</p>';
                return;
            }

            animes.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card group relative bg-slate-900 rounded-xl overflow-hidden shadow-lg transition-transform hover:-translate-y-2 cursor-pointer';
                card.onclick = () => window.location.href = `details.html?id=${anime.mal_id}`;
                
                card.innerHTML = `
                    <div class="aspect-[3/4] overflow-hidden relative">
                        <img src="${anime.images.jpg.large_image_url}" alt="${anime.title}" class="w-full h-full object-cover transition-transform group-hover:scale-110">
                        <div class="absolute top-2 right-2 bg-slate-900/80 backdrop-blur-md px-2 py-1 rounded-lg text-xs font-bold text-yellow-500 flex items-center gap-1">
                            <i class="fa-solid fa-star"></i> ${anime.score || 'N/A'}
                        </div>
                        <div class="overlay absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-0 transition-opacity flex flex-col justify-end p-4">
                            <span class="text-xs text-indigo-400 font-bold uppercase tracking-wider">${anime.type || 'TV'}</span>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm line-clamp-2 group-hover:text-indigo-400 transition-colors">${anime.title}</h3>
                        <p class="text-xs text-slate-500 mt-1">${anime.status === 'Currently Airing' ? 'Ongoing' : 'Finished'}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showLoader(show) {
            loader.classList.toggle('hidden', !show);
            animeGrid.classList.toggle('hidden', show);
        }

        function updateActiveBtn(label) {
            document.querySelectorAll('.genre-btn').forEach(btn => {
                if (btn.innerText === label) {
                    btn.classList.replace('bg-slate-800', 'bg-indigo-600');
                    btn.classList.replace('text-slate-300', 'text-white');
                } else {
                    btn.classList.replace('bg-indigo-600', 'bg-slate-800');
                    btn.classList.replace('text-white', 'text-slate-300');
                }
            });
        }
    </script>
</body>
</html>
