<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranPage - Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <header class="bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-slate-500 hover:text-emerald-400 transition-colors" title="Back to Index">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 id="surahTitle" class="text-xl font-bold text-emerald-400">Loading...</h1>
            <div class="flex items-center gap-2">
                <select id="verseSelect" class="bg-slate-800 text-sm text-white rounded-lg px-2 py-1 border border-slate-700">
                    <option value="">Verse</option>
                </select>
                <button id="jumpBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm px-3 py-1 rounded-lg transition-colors">
                    Jump
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div id="readerContent" class="space-y-6">
            <!-- Verses injected here -->
        </div>
    </main>

    <script>
        const API_BASE = 'https://api.alquran.cloud/v1';
        const readerContent = document.getElementById('readerContent');
        const surahTitle = document.getElementById('surahTitle');
        const verseSelect = document.getElementById('verseSelect');
        const jumpBtn = document.getElementById('jumpBtn');
        const urlParams = new URLSearchParams(window.location.search);
        const surahId = urlParams.get('id');

        async function fetchSurah() {
            try {
                const res = await fetch(`${API_BASE}/surah/${surahId}/editions/quran-uthmani,ms.basmeih`);
                const data = await res.json();
                renderReader(data.data);
                populateVerseDropdown(data.data[0].ayahs.length);
            } catch (err) {
                console.error(err);
                readerContent.innerHTML = '<p class="text-red-400">Failed to load Surah.</p>';
            }
        }

        function populateVerseDropdown(totalVerses) {
            verseSelect.innerHTML = '<option value="">Verse</option>';
            for (let i = 1; i <= totalVerses; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                verseSelect.appendChild(option);
            }
        }

        function jumpToVerse() {
            const verseNumber = verseSelect.value;
            if (!verseNumber) return;
            const element = document.getElementById(`verse-${verseNumber}`);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        jumpBtn.addEventListener('click', jumpToVerse);

        function renderReader(editions) {
            const arabicVerses = editions[0].ayahs;
            const malayVerses = editions[1].ayahs;
            surahTitle.innerText = editions[0].englishName;

            readerContent.innerHTML = '';
            arabicVerses.forEach((verse, index) => {
                const verseDiv = document.createElement('div');
                verseDiv.id = `verse-${verse.numberInSurah}`;
                verseDiv.className = 'border-b border-slate-800 pb-6';
                verseDiv.innerHTML = `
                    <div class="flex items-start gap-4 mb-4">
                        <span class="text-emerald-500 font-bold bg-slate-800 px-3 py-1 rounded-full text-sm">${verse.numberInSurah}</span>
                        <p class="text-right text-3xl font-serif leading-loose flex-grow">${verse.text}</p>
                    </div>
                    <p class="text-lg text-slate-400">${malayVerses[index].text}</p>
                `;
                readerContent.appendChild(verseDiv);
            });
        }

        if (surahId) {
            fetchSurah();
        } else {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
