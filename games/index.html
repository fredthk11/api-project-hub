<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | My Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <!-- Hero Section -->
    <header class="py-20 bg-gradient-to-b from-slate-900 to-slate-950 border-b border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-6xl font-black mb-6 bg-gradient-to-r from-pink-500 via-rose-500 to-red-500 bg-clip-text text-transparent">
                GAMES
            </h1>
            <p class="text-xl text-slate-400 max-w-2xl mx-auto">
                A collection of experimental interactive projects and mini-games.
            </p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16">
        <!-- Back Button -->
        <div class="mb-10">
            <a href="../index.html" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold py-3 px-6 rounded-xl transition-all">
                <i class="fa-solid fa-arrow-left text-sm"></i>
                Back to Home
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="projectGrid">
            
            <!-- Project Card: Connect Numbers -->
            <a href="./connect-numbers/index.html" class="group block relative bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 transition-all hover:border-pink-500/50 hover:shadow-2xl hover:shadow-pink-500/10">
                <div class="aspect-video bg-pink-900/20 flex items-center justify-center relative overflow-hidden">
                    <i class="fa-solid fa-gamepad text-6xl text-pink-500 group-hover:scale-110 transition-transform"></i>
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                </div>
                <div class="p-8">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="bg-pink-500/10 text-pink-400 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full">Interactive</span>
                        <span class="bg-slate-800 text-slate-400 text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full">Completed</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-3 group-hover:text-pink-400 transition-colors">Connect Numbers</h2>
                    <p class="text-slate-400 mb-6 line-clamp-2">
                        A simple, interactive click-based number connecting game.
                    </p>
                    <div class="inline-flex items-center gap-2 bg-pink-600 group-hover:bg-pink-500 text-white font-bold py-3 px-6 rounded-xl transition-all">
                        Launch Game
                        <i class="fa-solid fa-arrow-right text-sm"></i>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <footer class="py-20 border-t border-slate-900 text-center">
        <p class="text-slate-600">&copy; 2026 Web Room. Hosted on GitHub Pages.</p>
    </footer>

</body>
</html>
