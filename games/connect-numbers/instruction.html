<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructions | Connect Numbers | Web Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans p-6">

  <div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-slate-900 p-4 rounded-xl border border-slate-800">
      <a href="index.html" class="text-white hover:text-pink-400 transition-colors font-bold"><i class="fa-solid fa-gamepad"></i> Connect Numbers</a>
      <a href="../index.html" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
    </div>

    <h1 class="text-4xl font-black mb-8 text-center text-white">How to Play</h1>

    <div class="space-y-6 text-slate-300">
      <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-bold mb-2 text-white">🎯 Goal</h2>
        <p>Merge numbers until you reach the <span class="text-pink-400 font-bold">target number</span> (e.g., 2048).</p>
      </div>

      <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
        <h2 class="text-xl font-bold mb-2 text-white">🕹️ Controls</h2>
        <ul class="list-disc list-inside space-y-1">
          <li>Click tiles to <span class="text-pink-400 font-bold">highlight</span> connected numbers.</li>
          <li>Select at least <span class="text-pink-400 font-bold">2 tiles</span>.</li>
          <li>Press <span class="text-pink-400 font-bold">Space</span> or <b>Combine</b> to merge.</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
